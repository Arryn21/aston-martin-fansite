<div class="container">
  <h1>Astons on <span class="accent">Screen</span></h1>
  <p class="subtitle">Since 1964, no car and no character have belonged to each other like Aston Martin and 007.</p>
  <div id="movieList"></div>
</div>

<footer>An unofficial tribute · Not affiliated with Aston Martin Lagonda Ltd</footer>

<script src="js/data.js?v=4"></script>
<script src="js/ui.js?v=4"></script>
<script>
(function () {
  document.getElementById('movieList').innerHTML = MOVIES
    .slice().sort((a, b) => (a.year || 9999) - (b.year || 9999))
    .map(m => `
    <div class="movie-card reveal">
      <div class="year-chip">${m.year || 'Games'}</div>
      <div class="thumb" data-img="${m.carId || ''}"></div>
      <div>
        <h3>${m.film}</h3>
        <div class="car-name">${m.car}</div>
        <p>${m.note}</p>
      </div>
    </div>`).join('');
  document.querySelectorAll('.thumb[data-img]').forEach(el => AMUI.photo(el, el.dataset.img));
  AMUI.reveal();
})();
</script>
</body>
