<div class="container">
  <h1>A Century of <span class="accent">Survival &amp; Glory</span></h1>
  <p class="subtitle">Seven bankruptcies. One World Championship. The most romantic story in motoring.
     Scroll each era sideways — or use the arrows.</p>
  <div id="eras"></div>
</div>

<footer>An unofficial tribute · Not affiliated with Aston Martin Lagonda Ltd</footer>

<script src="js/data.js?v=4"></script>
<script src="js/ui.js?v=4"></script>
<script>
(function () {
  const wrap = document.getElementById('eras');
  const eras = [...new Set(TIMELINE.map(t => t.era))];
  wrap.innerHTML = eras.map((era, ei) => {
    const cards = TIMELINE.filter(t => t.era === era).map(t => `
      <div class="era-card">
        <div class="photo" data-img="${t.img}"><span class="year-tag">${t.year}</span></div>
        <div class="body"><h3>${t.title}</h3><p>${t.text}</p></div>
      </div>`).join('');
    return `
      <h2 class="reveal">${era}</h2>
      <div class="era-strip-wrap reveal">
        <div class="strip-nav">
          <button data-dir="-1" data-strip="${ei}" aria-label="Scroll left">‹</button>
          <button data-dir="1" data-strip="${ei}" aria-label="Scroll right">›</button>
        </div>
        <div class="era-strip" id="strip${ei}">${cards}</div>
      </div>`;
  }).join('');

  wrap.querySelectorAll('.photo[data-img]').forEach(el => AMUI.photo(el, el.dataset.img));
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('button[data-strip]');
    if (!btn) return;
    document.getElementById('strip' + btn.dataset.strip)
      .scrollBy({ left: 350 * Number(btn.dataset.dir), behavior: 'smooth' });
  });
  AMUI.reveal();
})();
</script>
</body>
